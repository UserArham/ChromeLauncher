]<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chromecraft Launcher</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: "Inter", sans-serif;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
    color: white;
}

/* BASE WORLD */
body::before {
    content: "";
    position: fixed;
    inset: 0;
    background: url("https://images5.alphacoders.com/752/thumb-1920-752070.jpg") center/cover no-repeat;
    filter: brightness(0.65) saturate(1.7) contrast(1.25);
    transform: scale(1.15);
    z-index: -6;
}

/* DARK DEPTH FIELD */
body::after {
    content: "";
    position: fixed;
    inset: 0;
    background: radial-gradient(circle at 50% 30%, rgba(255,255,255,0.10), rgba(0,0,0,0.92));
    z-index: -5;
}

/* FLOATING LIGHT ORBS (REAL FAKE REFRACTION FEEL) */
.orbs {
    position: fixed;
    inset: 0;
    background:
        radial-gradient(circle at 20% 30%, rgba(120,180,255,0.08), transparent 40%),
        radial-gradient(circle at 70% 60%, rgba(255,255,255,0.06), transparent 45%),
        radial-gradient(circle at 40% 80%, rgba(100,200,255,0.05), transparent 50%);
    animation: drift 14s ease-in-out infinite;
    z-index: -4;
}

@keyframes drift {
    0%,100% { transform: translate(0,0); }
    50% { transform: translate(-30px,20px); }
}

/* LIQUID SHEEN LAYER */
.sheen {
    position: fixed;
    inset: -200%;
    background: linear-gradient(
        120deg,
        transparent 46%,
        rgba(255,255,255,0.14) 50%,
        transparent 54%
    );
    animation: shine 5.5s linear infinite;
    z-index: -3;
}

@keyframes shine {
    0% { transform: translateX(-50%) rotate(12deg); }
    100% { transform: translateX(50%) rotate(12deg); }
}

/* ULTRA GLASS CORE */
.launcher {
    width: 1000px;
    height: 680px;

    position: relative;
    overflow: hidden;

    border-radius: 36px;

    background: rgba(255,255,255,0.10);

    border: 1px solid rgba(255,255,255,0.20);

    backdrop-filter: blur(70px) saturate(280%);
    -webkit-backdrop-filter: blur(70px) saturate(280%);

    display: flex;

    box-shadow:
        0 70px 200px rgba(0,0,0,0.95),
        inset 0 1px 0 rgba(255,255,255,0.3),
        inset 0 -40px 120px rgba(255,255,255,0.06);
}

/* SECOND GLASS LAYER (FAKE REFRACTION DEPTH) */
.launcher::before {
    content: "";
    position: absolute;
    inset: 0;
    background:
        radial-gradient(circle at 20% 20%, rgba(255,255,255,0.12), transparent 60%),
        radial-gradient(circle at 80% 80%, rgba(120,180,255,0.08), transparent 55%);
    pointer-events: none;
}

/* SIDEBAR */
.sidebar {
    width: 370px;

    background: linear-gradient(
        180deg,
        rgba(255,255,255,0.14),
        rgba(255,255,255,0.03)
    );

    backdrop-filter: blur(60px);

    border-right: 1px solid rgba(255,255,255,0.14);

    padding: 14px;
    overflow-y: auto;
}

/* ULTRA VERSION CARD */
.version {
    display: flex;
    align-items: center;
    gap: 10px;

    padding: 14px;
    border-radius: 20px;

    cursor: pointer;
    transition: 0.25s;

    position: relative;
    overflow: hidden;

    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.08);
}

/* REFRACTION SWEEP */
.version::before {
    content: "";
    position: absolute;
    inset: -70%;
    background: linear-gradient(
        120deg,
        transparent,
        rgba(255,255,255,0.16),
        transparent
    );
    transform: translateX(-90%);
    transition: 0.8s;
}

.version:hover::before {
    transform: translateX(90%);
}

.version:hover {
    transform: translateY(-6px) scale(1.03);
    box-shadow: 0 35px 90px rgba(0,0,0,0.55);
}

.version.active {
    background: rgba(120,180,255,0.50);
    box-shadow:
        0 0 60px rgba(120,180,255,0.55),
        inset 0 1px 0 rgba(255,255,255,0.4);
}

.version img {
    width: 28px;
    height: 28px;
}

/* MAIN */
.main {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    padding: 36px;
}

/* HEADER */
.header {
    display: flex;
    align-items: center;
    gap: 12px;

    font-size: 26px;
    font-weight: 600;

    padding-bottom: 18px;
    margin-bottom: 20px;

    border-bottom: 1px solid rgba(255,255,255,0.12);
}

.header img {
    width: 32px;
    height: 32px;
}

/* TEXT */
.title {
    font-size: 46px;
    font-weight: 700;

    text-shadow: 0 30px 90px rgba(0,0,0,0.85);
}

.desc {
    margin-top: 14px;
    line-height: 1.8;
    opacity: 0.85;
    max-height: 200px;
    overflow: auto;
}

/* GOD BUTTON FINAL FORM */
.play {
    width: 100%;
    padding: 22px;

    border-radius: 26px;

    border: 1px solid rgba(255,255,255,0.25);

    font-size: 16px;
    font-weight: 700;

    color: white;

    background: linear-gradient(
        135deg,
        rgba(100,190,255,0.95),
        rgba(20,100,255,0.85)
    );

    cursor: pointer;

    transition: 0.25s;

    box-shadow:
        0 45px 140px rgba(0,120,255,0.55),
        inset 0 1px 0 rgba(255,255,255,0.55);
}

.play:hover {
    transform: translateY(-8px);
    box-shadow:
        0 60px 180px rgba(0,140,255,0.65),
        inset 0 1px 0 rgba(255,255,255,0.75);
}

.small {
    font-size: 12px;
    opacity: 0.6;
    margin-top: 14px;
}
</style>
</head>

<body>

<div class="orbs"></div>
<div class="sheen"></div>

<div class="launcher">

    <div class="sidebar" id="list"></div>

    <div class="main">

        <div>
            <div class="header">
                <img src="https://upload.wikimedia.org/wikipedia/commons/8/87/Google_Chrome_icon_%282011%29.png">
                Chromecraft
            </div>

            <div class="title" id="title">Select a version</div>
            <div class="desc" id="desc">Ultra liquid glass system active.</div>
        </div>

        <div>
            <button class="play" onclick="play()">Play</button>
            <div class="small" id="url"></div>
        </div>

    </div>

</div>

<script>

const ICON = "https://images.icon-icons.com/2699/PNG/512/minecraft_logo_icon_168974.png";

const versions = [
{ name:"Beta 1.3", url:"https://chromecraft-beta-1-3.vercel.app/", desc:"Early build of Chromecraft, often unstable though." },
{ name:"Release 1.5.0", url:"https://chromecraft-1-5-0.vercel.app/", desc:"First release of early Chromecraft with redstone." },
{ name:"Release 1.8.7", url:"https://chromecraft-1-8-7.vercel.app/", desc:"Stability update so browsers could read without lag." },
{ name:"Release 1.12.2", url:"https://chromecraft-1-12-2.vercel.app/", desc:"Expansion update including some parrots!" },
{ name:"Release 1.14.4", url:"https://userarham.github.io/Chromecraft-1.14.4/", desc:"Optimization pass, added pillagers and villager jobs." },
{ name:"Release 1.16.5", url:"https://userarham.github.io/Chromecraft-1.16.5/", desc:"Nether update, including piglins." },
{ name:"Release 1.16.6", url:"https://chromecraft-1-16-6.vercel.app/", desc:"Latest build of Chromecraft." }
];

let selected = 0;

function render(){
    const list = document.getElementById("list");
    list.innerHTML = "";

    versions.forEach((v,i)=>{
        const div = document.createElement("div");
        div.className = "version" + (i===selected ? " active":"");

        div.innerHTML = `
            <img src="${ICON}">
            <div>${v.name}</div>
        `;

        div.onclick = ()=>{
            selected = i;
            update();
            render();
            localStorage.setItem("chromecraft_last", i);
        };

        list.appendChild(div);
    });

    update();
}

function update(){
    const v = versions[selected];
    document.getElementById("title").innerText = v.name;
    document.getElementById("desc").innerText = v.desc;
    document.getElementById("url").innerText = v.url;
}

function play(){
    window.location.href = versions[selected].url;
}

window.onload = ()=>{
    const saved = localStorage.getItem("chromecraft_last");
    if(saved !== null) selected = parseInt(saved);
    render();
};

</script>

</body>
</html>
